<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="1000" fill="#FDF6EC" />

  <!-- Define Fonts (Simulated by styling) -->
  <style>
    .abstract-label { font-family: 'Georgia', serif; font-weight: bold; fill: #3D2B1F; font-size: 18px; }
    .concrete-label { font-family: 'Calibri', 'sans-serif'; fill: #3D2B1F; font-size: 16px; }
    .abstract-sub { font-family: 'Georgia', serif; font-style: italic; fill: #3D2B1F; font-size: 12px; }
    .line { stroke: #C8813A; stroke-width: 2; fill: none; }
    .dashed-line { stroke: #C8813A; stroke-width: 2; fill: none; stroke-dasharray: 5,5; }
    .arrowhead { fill: #C8813A; }
    .legend-text { font-family: 'Calibri', sans-serif; fill: #3D2B1F; font-size: 14px; }
  </style>

  <!-- Markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#C8813A" />
    </marker>
  </defs>

  <!-- TREE 1: PERSON -->
  <!-- Person (Abstract) -->
  <rect x="300" y="50" width="200" height="80" fill="#F5EBDD" stroke="#C8813A" stroke-width="1" />
  <rect x="300" y="50" width="6" height="80" fill="#C8813A" />
  <text x="315" y="85" class="abstract-label">Person</text>
  <text x="315" y="105" class="abstract-sub">&lt;&lt;abstract&gt;&gt;</text>

  <!-- User (Concrete) -->
  <rect x="150" y="200" width="160" height="60" fill="#FFFBF7" stroke="#C8813A" stroke-width="1" />
  <text x="170" y="235" class="concrete-label">User</text>

  <!-- Admin (Concrete) -->
  <rect x="490" y="200" width="160" height="60" fill="#FFFBF7" stroke="#C8813A" stroke-width="1" />
  <text x="510" y="235" class="concrete-label">Admin</text>

  <!-- Inheritance Arrows (Pointing UP) -->
  <line x1="230" y1="200" x2="380" y2="140" class="line" marker-end="url(#arrow)" />
  <line x1="570" y1="200" x2="420" y2="140" class="line" marker-end="url(#arrow)" />

  <!-- BOOKING (Standalone) -->
  <rect x="320" y="350" width="160" height="60" fill="#FFFBF7" stroke="#C8813A" stroke-width="1" />
  <text x="340" y="385" class="concrete-label">Booking</text>

  <!-- Association Lines (Dashed) -->
  <!-- Booking to User -->
  <path d="M320,380 L230,380 L230,260" class="dashed-line" />
  <text x="240" y="375" class="legend-text" style="font-size: 10px;">belongs to</text>

  <!-- TREE 2: TRANSPORT -->
  <!-- Transport (Abstract) -->
  <rect x="300" y="550" width="200" height="80" fill="#F5EBDD" stroke="#C8813A" stroke-width="1" />
  <rect x="300" y="550" width="6" height="80" fill="#C8813A" />
  <text x="315" y="585" class="abstract-label">Transport</text>
  <text x="315" y="605" class="abstract-sub">&lt;&lt;abstract&gt;&gt;</text>

  <!-- Booking to Transport Association -->
  <line x1="400" y1="410" x2="400" y2="550" class="dashed-line" />
  <text x="405" y="480" class="legend-text" style="font-size: 10px;">references</text>

  <!-- Flight (Concrete) -->
  <rect x="100" y="750" width="160" height="60" fill="#FFFBF7" stroke="#C8813A" stroke-width="1" />
  <text x="120" y="785" class="concrete-label">Flight</text>

  <!-- Bus (Concrete) -->
  <rect x="320" y="750" width="160" height="60" fill="#FFFBF7" stroke="#C8813A" stroke-width="1" />
  <text x="340" y="785" class="concrete-label">Bus</text>

  <!-- Train (Concrete) -->
  <rect x="540" y="750" width="160" height="60" fill="#FFFBF7" stroke="#C8813A" stroke-width="1" />
  <text x="560" y="785" class="concrete-label">Train</text>

  <!-- Inheritance Arrows (Pointing UP) -->
  <line x1="180" y1="750" x2="350" y2="640" class="line" marker-end="url(#arrow)" />
  <line x1="400" y1="750" x2="400" y2="640" class="line" marker-end="url(#arrow)" />
  <line x1="620" y1="750" x2="450" y2="640" class="line" marker-end="url(#arrow)" />

  <!-- LEGEND -->
  <g transform="translate(50, 880)">
    <rect width="250" height="80" fill="none" stroke="#C8813A" stroke-width="0.5" />
    
    <!-- Abstract Legend -->
    <rect x="10" y="10" width="30" height="20" fill="#F5EBDD" stroke="#C8813A" stroke-width="1" />
    <rect x="10" y="10" width="3" height="20" fill="#C8813A" />
    <text x="50" y="25" class="legend-text">Abstract Class (Georgia Bold)</text>
    
    <!-- Concrete Legend -->
    <rect x="10" y="45" width="30" height="20" fill="#FFFBF7" stroke="#C8813A" stroke-width="1" />
    <text x="50" y="60" class="legend-text">Concrete Class (Calibri Regular)</text>

    <!-- Lines Legend -->
    <line x1="10" y1="75" x2="40" y2="75" class="line" />
    <text x="50" y="80" class="legend-text" style="font-size: 10px;">Inheritance</text>
    <line x1="130" y1="75" x2="160" y2="75" class="dashed-line" />
    <text x="170" y="80" class="legend-text" style="font-size: 10px;">Association</text>
  </g>
</svg>
